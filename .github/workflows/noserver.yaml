name: Playwright Tests
on:
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Install tests dependencies
        working-directory: tests
        run: npm ci

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Install Playwright Dependencies (system libs)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Prettier check
        working-directory: tests
        run: npx prettier --check .

      - name: Run ESLint check
        working-directory: tests
        run: npx eslint .

      - name: Run Playwright tests
        working-directory: tests
        run: SKIP_SERVER=true npx playwright test --grep-invert @server

      - name: Upload report
        if: always()  # Тепер це частина кроку Upload report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/ui/e2e/playwright-report/ 
          retention-days: 30