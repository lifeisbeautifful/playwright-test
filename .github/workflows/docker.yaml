name: Docker Tests
on:
  workflow_dispatch:

jobs:
  docker-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check CPU Cores
        run: nproc # Покаже кількість ядер у консолі (для ubuntu-latest це буде 2)

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Налаштовуємо Buildx (це рушій для розумного кешування)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push (Smart Build)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/plw-tests:latest
            ${{ secrets.DOCKER_USERNAME }}/plw-tests:${{ github.sha }}
          # Кешування для швидкості (наступні білди будуть за секунди)
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests via Compose
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: docker compose up --abort-on-container-exit --exit-code-from playwright-test

      - name: Upload report
        if: always()  # Тепер це частина кроку Upload report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/ 
          retention-days: 30