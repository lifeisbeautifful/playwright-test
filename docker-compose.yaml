services: 
  playwright-test:
    container_name: my-tests
    build: 
      context: .
      dockerfile: ./Dockerfile
    image: plw-tests
    command: npm run api
    volumes: 
      - ./tests:/app/tests # Код тестів (синхронізація)
      - ./tests/playwright-report/:/app/tests/playwright-report
      - ./tests/test-results/:/app/tests/test-results
